<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia del tablero: Rollover GGAL</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --texto-principal: #ffffff;
            --texto-silenciado: #a0a0a0;
            --acento: #00e676; /* Verde Balanz/BYMA */
            --peligro: #ff5252;
            --borde: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--texto-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            background-color: var(--panel-bg);
            border: 1px solid var(--borde);
            border-radius: 10px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
        }

        h2 {
            color: var(--acento);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .grupo-formulario {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--texto-silenciado);
            font-size: 14px;
        }

        input[type="date"], 
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--borde);
            background-color: #2a2a2a;
            color: var(--texto-principal);
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--acento);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #00c853;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Panel de Rollover GGAL</h2>
        
        <div class="grupo-formulario">
            <label for="fecha-vencimiento">📅 Fecha de Vencimiento:</label>
            <input type="date" id="fecha-vencimiento" value="2026-04-17">
        </div>

        <div class="grupo-formulario">
            <label for="cantidad-lotes">📊 Cantidad de Lotes (Lanzamiento / Put):</label>
            <input type="number" id="cantidad-lotes" value="46" min="1">
        </div>
        
        <div class="grupo-formulario">
            <label for="prima-cobrada">💵 Prima Cobrada por Lote ($):</label>
            <input type="number" id="prima-cobrada" placeholder="Ej: 120.50" step="0.01">
        </div>

        <button onclick="alert('Calculadora en construcción')">Calcular Estrategia</button>
    </div>

</body>
</html>
